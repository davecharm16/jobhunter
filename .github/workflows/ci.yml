name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# GHCR push needs package write; checkout needs read.
permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend (lint, types, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # WeasyPrint's native deps — required to import the web extra and run the
      # PDF-writer tests.
      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libgdk-pixbuf-2.0-0 libcairo2 libffi-dev shared-mime-info

      - name: Install package (web + dev extras)
        run: pip install -e ".[web,dev]"

      # Lint + format start ADVISORY: the existing tree has a ~500-issue / 285-file
      # backlog. Land a one-time `ruff check --fix && ruff format` cleanup commit,
      # then delete the two `continue-on-error` lines below to make these blocking.
      - name: Ruff lint (advisory)
        run: ruff check .
        continue-on-error: true

      - name: Ruff format check (advisory)
        run: ruff format --check .
        continue-on-error: true

      # Advisory until the existing codebase is fully annotated — surfaces type
      # regressions without blocking merges. Flip to a hard gate once green.
      - name: mypy (advisory)
        run: mypy
        continue-on-error: true

      - name: pytest
        run: pytest -q

      # Advisory: report known CVEs in dependencies without failing on transitive
      # issues you cannot immediately fix.
      - name: pip-audit (advisory)
        run: pip-audit || true

  frontend:
    name: Frontend (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/jobhunter/web/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/jobhunter/web/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Build
        run: npm run build

      - name: npm audit (advisory)
        run: npm audit --omit=dev || true

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build the production image (incl. the WeasyPrint layer + frontend stage)
      # to catch Dockerfile breakage in CI. No push.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: jobhunter:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    # Only on pushes to main (not PRs), and only after tests/build pass.
    needs: [backend, frontend, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:main
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
