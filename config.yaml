# Tunable configuration for jobhunter (Story 2.2).
# Secrets do NOT live here — put API keys and the like in `.env`.
# Edit values below; defaults match the committed template.
#
# Notification contract (Story 6.1 + Story 6.2). Pass -> the pipeline POSTs
# one Google Chat message to `GCHAT_WEBHOOK_URL` (read from `.env`, never
# committed). Fail on any drift check (fabrication, content-loss, or
# keyword-stuffing) -> the package is held quietly at `./out/<slug>/` with
# `metadata.held = true` plus `package.held.json` + `drift-report.md`
# sidecars, and ZERO POSTs hit the webhook. Story 6.2 pins the no-notify-
# on-fail contract structurally — see `src/jobhunter/notifier.py` and
# `src/jobhunter/tailoring.py`'s notification gate
# (`held_path_value is None and _all_drift_pass(drift_verdicts)`).

cost:
  monthly_cap_usd: 25
  per_app_max_usd: 0.25

output:
  dir: out

prompts:
  cv: prompts/cv.v1.md
  cover_letter: prompts/cover_letter.v1.md
  upwork_proposal: prompts/upwork_proposal.v1.md

red_flags:
  upwork:
    budget_floor_usd_hourly: 25
    budget_floor_usd_fixed: 500
  onlinejobs_ph:
    rate_floor_usd_monthly: 600

proposal:
  max_words: 250

# Story 3.1 (claim extraction) + Story 3.3 (semantic threshold) + Story 3.4
# (held-package retention). `semantic_method` defaults to `rule_based` in v1
# because the locked-in LLM provider (Anthropic) does not currently expose
# an embeddings endpoint; `embedding_cosine` is the documented upgrade path
# (see `_bmad-output/decisions/llm-provider.md` "Story 3.3"). The matcher
# itself lives in `semantic_matcher.py`. `held_retention_days` is the window
# before the next pipeline run sweeps expired held packages off disk.
fabrication:
  claim_extraction:
    timeout_seconds: 60.0
  semantic_method: rule_based
  semantic_threshold: 0.65
  held_retention_days: 7

# Story 4.3 — content-loss drift check tunables. Defaults skew conservative
# (high recall, more flags); the author tightens after 20+ apps if overrides
# dominate. The matcher mode + threshold land in package.drift.json's
# content_loss.config_snapshot so historical drift logs stay correlatable
# with config changes.
drift:
  content_loss:
    relevance_matcher: tag_overlap     # one of: tag_overlap | keyword_overlap | embedding_distance. tag_overlap is the v1 default — pure rule-based, no LLM call.
    tag_overlap_min: 1                 # min count of overlapping tags between entry.tags and (must_haves + nice_to_haves). lower = more flags, higher recall.
    keyword_overlap_pct: 0.20          # used when relevance_matcher == keyword_overlap. token-overlap fraction between entry text and JD requirements.
    embedding_distance_max: 0.35       # cosine cutoff when relevance_matcher == embedding_distance. v1 raises EmbeddingMatcherUnavailable until an embeddings client is wired.
    presence_matcher: substring        # one of: substring | semantic. substring is strictest; semantic requires an embeddings client (v1 raises).
    presence_semantic_threshold: 0.80  # cosine similarity cutoff when presence_matcher == semantic.
    reason_codes: ["irrelevant_to_jd", "silently_lost"]  # enumerated drop reasons; future codes can be appended without code changes.

# Story 5.3 — keyword-stuffing drift check tunables. Mirrors Stories 5.1/5.2's
# conservative defaults: a 1.5% per-keyword density ceiling + 3-rep ceiling
# (density dimension), and a 15-token dump-paragraph floor with a 30%
# must-have-ratio ceiling + 4-item comma-run floor (placement dimension).
# Per-channel overrides under `channels.<board>` shallow-merge over the
# globals; the resolved set lands in package.drift.json's
# keyword_stuffing.thresholds_applied so historical drift logs stay
# correlatable with config changes. The shipped `channels.upwork` overrides
# below are commented out — a fresh checkout applies identical thresholds to
# every channel until the author explicitly opts in to looser Upwork values
# (which legitimately repeat JD phrasing because client screening questions
# force it).
keyword_stuffing:
  max_density_pct: 1.5                       # per-keyword density ceiling. lower = stricter (more flags); higher = more permissive.
  max_repetitions_per_artifact: 3            # per-keyword occurrence ceiling per artifact. evaluated independently per file (cv.md, cover-letter.md, ...).
  dump_paragraph_min_tokens: 15              # paragraph length floor for the dump-paragraph rule. shorter paragraphs never trigger the rule.
  dump_paragraph_max_keyword_ratio: 0.30     # max fraction of paragraph tokens that may be JD must-haves before it's flagged as a "skills dump".
  comma_run_min_tokens: 4                    # min length of a comma-separated run of pure JD must-haves before it's flagged.
  channels:                                  # per-channel overrides; shallow-merged over the globals above. an empty `{}` means "use the globals as-is".
    # Upwork: uncomment any subset below to loosen Upwork thresholds (Upwork
    # JDs legitimately repeat keywords in screening Qs); the shipped default
    # is `{}` so a fresh checkout applies identical thresholds to every channel.
    upwork: {}
      # max_repetitions_per_artifact: 5      # Upwork screening questions force keyword repetition; a higher ceiling avoids false-positive holds.
      # dump_paragraph_max_keyword_ratio: 0.45  # Upwork proposals quote JD phrasing; a higher ratio tolerates the unavoidable echo.
    linkedin: {}                             # no overrides for LinkedIn — defaults match the channel's natural prose density.
    onlinejobs_ph: {}                        # no overrides for OnlineJobs.ph — defaults apply.
    other: {}                                # no overrides for unclassified JDs — defaults apply.
