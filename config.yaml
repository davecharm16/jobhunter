# Tunable configuration for jobhunter (Story 2.2).
# Secrets do NOT live here — put API keys and the like in `.env`.
# Edit values below; defaults match the committed template.

cost:
  monthly_cap_usd: 25
  per_app_max_usd: 0.25

output:
  dir: out

prompts:
  cv: prompts/cv.v1.md
  cover_letter: prompts/cover_letter.v1.md
  upwork_proposal: prompts/upwork_proposal.v1.md

red_flags:
  upwork:
    budget_floor_usd_hourly: 25
    budget_floor_usd_fixed: 500
  onlinejobs_ph:
    rate_floor_usd_monthly: 600

proposal:
  max_words: 250

# Story 3.1 (claim extraction) + Story 3.3 (semantic threshold) + Story 3.4
# (held-package retention). `semantic_method` defaults to `rule_based` in v1
# because the locked-in LLM provider (Anthropic) does not currently expose
# an embeddings endpoint; `embedding_cosine` is the documented upgrade path
# (see `_bmad-output/decisions/llm-provider.md` "Story 3.3"). The matcher
# itself lives in `semantic_matcher.py`. `held_retention_days` is the window
# before the next pipeline run sweeps expired held packages off disk.
fabrication:
  claim_extraction:
    timeout_seconds: 60.0
  semantic_method: rule_based
  semantic_threshold: 0.65
  held_retention_days: 7
