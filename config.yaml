# Tunable configuration for jobhunter (Story 2.2).
# Secrets do NOT live here — put API keys and the like in `.env`.
# Edit values below; defaults match the committed template.

cost:
  monthly_cap_usd: 25
  per_app_max_usd: 0.25

output:
  dir: out

prompts:
  cv: prompts/cv.v1.md
  cover_letter: prompts/cover_letter.v1.md
  upwork_proposal: prompts/upwork_proposal.v1.md

red_flags:
  upwork:
    budget_floor_usd_hourly: 25
    budget_floor_usd_fixed: 500
  onlinejobs_ph:
    rate_floor_usd_monthly: 600

proposal:
  max_words: 250

# Story 3.1 (claim extraction) + Story 3.3 (semantic threshold) + Story 3.4
# (held-package retention). `semantic_method` defaults to `rule_based` in v1
# because the locked-in LLM provider (Anthropic) does not currently expose
# an embeddings endpoint; `embedding_cosine` is the documented upgrade path
# (see `_bmad-output/decisions/llm-provider.md` "Story 3.3"). The matcher
# itself lives in `semantic_matcher.py`. `held_retention_days` is the window
# before the next pipeline run sweeps expired held packages off disk.
fabrication:
  claim_extraction:
    timeout_seconds: 60.0
  semantic_method: rule_based
  semantic_threshold: 0.65
  held_retention_days: 7

# Story 4.3 — content-loss drift check tunables. Defaults skew conservative
# (high recall, more flags); the author tightens after 20+ apps if overrides
# dominate. The matcher mode + threshold land in package.drift.json's
# content_loss.config_snapshot so historical drift logs stay correlatable
# with config changes.
drift:
  content_loss:
    relevance_matcher: tag_overlap     # one of: tag_overlap | keyword_overlap | embedding_distance. tag_overlap is the v1 default — pure rule-based, no LLM call.
    tag_overlap_min: 1                 # min count of overlapping tags between entry.tags and (must_haves + nice_to_haves). lower = more flags, higher recall.
    keyword_overlap_pct: 0.20          # used when relevance_matcher == keyword_overlap. token-overlap fraction between entry text and JD requirements.
    embedding_distance_max: 0.35       # cosine cutoff when relevance_matcher == embedding_distance. v1 raises EmbeddingMatcherUnavailable until an embeddings client is wired.
    presence_matcher: substring        # one of: substring | semantic. substring is strictest; semantic requires an embeddings client (v1 raises).
    presence_semantic_threshold: 0.80  # cosine similarity cutoff when presence_matcher == semantic.
    reason_codes: ["irrelevant_to_jd", "silently_lost"]  # enumerated drop reasons; future codes can be appended without code changes.
